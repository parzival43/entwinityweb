<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entwinity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="intro-screen">
    <div class="logo-wrap">
      <div class="logo-circle">E</div>
      <div class="logo-title">Entwinity</div>
    </div>
  </div>

  <div id="app" class="hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">E</div>
        <div>
          <div class="sidebar-title">Entwinity</div>
          <div class="sidebar-subtitle">Community groups</div>
        </div>
      </div>
      <div id="group-list" class="group-list"></div>
    </aside>

    <main class="content">
      <div class="content-card">
        <h1 id="group-title">Select a group</h1>
        <p id="group-description">Pick a group from the left to see details and join the community.</p>
        <a id="group-link" class="group-link" href="#" target="_blank" rel="noopener">Community link</a>
      </div>
    </main>
  </div>

  <script src="js.js"></script>
</body>
</html>
